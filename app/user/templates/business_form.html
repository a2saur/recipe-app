{% extends "base.html" %}
{% import 'bootstrap_wtf.html' as wtf %}

{% block content %}
    <h1>{{title}}</h1>
    <form action="{{url_for(form_action)}}" method = "POST">
        {{form.hidden_tag()}}
        {{wtf.form_field(form.business_name)}}
        {{wtf.form_field(form.business_website)}}
        <br>
        
        <div class="d-flex align-items-center gap-2 mt-3"> 
            {{form.submit(class="btn btn-outline-success")}}
            <a href="{{url_for('user.display_profile')}}" class = 'btn btn-outline-secondary'>Cancel</a>
            {% if edit %}
                <button type ='submit' name="delete_business" class = "btn btn-outline-danger" onclick="return confirm('Are you sure you want to delete your business?');">
                    Delete Business
                </button>
            {% endif %}
        </div>
    </form>
{% endblock %}
